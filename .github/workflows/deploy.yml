name: Deploy to GitHub Pages

# Not live: GitHub Pages was never enabled in repo Settings, so this fails every
# run (5s, before it even builds) and spams a failure email on every push. Netlify
# (chineseclassics.netlify.app) is still the real deploy. Manual-trigger only until
# Pages is turned on in Settings -> Pages -> Source: GitHub Actions - re-add the
# push trigger below once that's done and a manual run succeeds.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
