name: Deploy to GitHub Pages

# Live once Settings -> Pages -> Source is set to "GitHub Actions" (one-time,
# manual — GitHub doesn't expose this toggle over git push or a public API token
# scope we have). Until then this still only runs on manual dispatch below;
# flip to `push: branches: [master]` once Pages is confirmed working.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
