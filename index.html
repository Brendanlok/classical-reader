<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>四大名著 · Four Great Classical Novels</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B1A1A">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="四大名著">

  <link rel="stylesheet" href="styles.css">
  <style>
    /* Toolbar offset for sticky nav — JS updates this when breadcrumb row shows */
    body { padding-top: 52px; }
  </style>
</head>
<body>

<!-- Fixed toolbar for view toggle -->
<div id="toolbar"></div>
<!-- Chapter reading progress bar (bottom) -->
<div id="reading-progress-bar">
  <div id="reading-progress-fill"></div>
  <span id="reading-progress-pct" class="bc-progress-pct">0%</span>
</div>

<!-- App shell -->
<div id="app-wrapper">
  <div id="app-frame">

    <!-- Header -->
    <header id="main-header">
      <h1>四大名著</h1>
      <p>Four Great Classical Novels of Chinese Literature</p>
    </header>

    <!-- Nav tabs -->
    <nav id="nav-tabs"></nav>

    <!-- Main content -->
    <main id="content"></main>

    <!-- Footer -->
    <footer id="app-footer"></footer>

  </div>
</div>

<!-- Supabase SDK — auth, per-user data, shared chapter_cache + feedback -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="data.js?v=20260718stageB"></script>
<script src="chapters.js?v=20260718stageB"></script>
<script src="user.js?v=20260718stageB"></script>
<script src="app.js?v=20260718stageB"></script>

<!-- AI Companion -->
<div id="ai-companion-root"></div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
